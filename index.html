<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday 🎂</title>
    <style>
        @import url('https://fonts.googleapis.com/css?family=Nobile:400italic,700italic');

        :root {
            --border-color: #ffffff;
            --vanilla: #ff75c8;
            --chocolate: #a866c7;
            --bg-front: #9d4edd;
            --bg-page: #f8e8ff;
            --text-main: #6a0572;
            --btn-color: #7b2cbf;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            overflow: hidden;
            background: linear-gradient(135deg, #ff6b9d, #c44569, #6c5ce7);
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Nobile', sans-serif;
        }

        .book {
            position: relative;
            width: 390px;
            height: 550px;
            perspective: 1500px;
        }

        .page {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 12px solid var(--border-color);
            border-radius: 16px;
            backface-visibility: hidden;
            transform-style: preserve-3d;
            transform-origin: left center;
            transition: transform 0.9s cubic-bezier(0.645, 0.045, 0.355, 1);
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
        }

        /* Cover design */
        .cover {
            background: linear-gradient(135deg, #9d4edd, #c77dff);
            z-index: 4;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        .cover-text {
            font-size: 26px;
            color: #ffffff;
            text-shadow: 0 0 10px rgba(255,255,255,0.8);
            font-weight: bold;
        }

        .cake-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .cake-bg {
            width: 180px;
            height: 180px;
            background: linear-gradient(135deg, #ff75c8, #ff9ff3);
            clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 25px rgba(255, 117, 200, 0.6);
        }

        .cake {
            width: 100px;
            height: 80px;
            position: relative;
        }

        .cake > * {
            position: absolute;
        }

        .layer {
            width: 100px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(180deg, #7b2cbf, #5a2d82);
            box-shadow: 0 2px 0 #4b2372, 0 4px 0 #3c1a62;
        }
        .layer-top { top: 0; }
        .layer-middle { top: 13px; }
        .layer-bottom { top: 26px; }

        .icing {
            top: 0; left: 2px;
            background: linear-gradient(180deg, #ff75c8, #ff9ff3);
            width: 96px; height: 36px;
            border-radius: 50%;
            box-shadow: inset 0 -2px 5px rgba(255,50,150,0.2);
        }

        .candle {
            background: #c77dff;
            width: 6px; height: 20px;
            border-radius: 4px;
            top: -8px; left: 50%; margin-left: -3px;
        }
        .flame {
            position: absolute;
            background: linear-gradient(180deg, #ffbe0b, #fb5607, #ff006e);
            width: 8px; height: 18px;
            border-radius: 50% 50% 30% 30%;
            top: -16px; left: 50%; margin-left: -4px;
            box-shadow: 0 0 15px rgba(255,190,11,0.7);
            animation: flicker 1.2s infinite alternate;
        }
        @keyframes flicker {
            0% { transform: scale(1) rotate(-2deg); }
            100% { transform: scale(1.1) rotate(2deg); }
        }

        /* Text below cake */
        .gift-text {
            color: #ffffff;
            font-size: 18px;
            font-weight: 500;
            text-align: center;
            line-height: 1.6;
            text-shadow: 0 0 8px rgba(255,255,255,0.6);
        }

        /* Pages order */
        .page-1 {
            background: var(--bg-page);
            transform: rotateY(180deg);
            z-index: 3;
        }
        .page-2 {
            background: var(--bg-page);
            transform: rotateY(180deg);
            z-index: 2;
        }
        .page-3 {
            background: var(--bg-page);
            transform: rotateY(180deg);
            z-index: 1;
        }

        .text-area {
            width: 85%;
            height: 85%;
            margin: auto;
            display: flex;
            flex-direction: column;
            justify-content: center;
            text-align: center;
            padding: 15px;
        }

        .page-title {
            font-size: 2.2em;
            margin-bottom: 25px;
            background: linear-gradient(135deg, #ff2e63, #9d4edd);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: bold;
            min-height: 60px;
        }

        .page-content {
            color: var(--text-main);
            font-style: normal;
            font-size: 1.2em;
            line-height: 1.8;
            margin-bottom: 30px;
            min-height: 120px;
            white-space: pre-line;
        }

        .btn-group {
            display: flex;
            justify-content: space-between;
            gap: 10px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            background: var(--btn-color);
            color: white;
            cursor: pointer;
            box-shadow: 0 3px 10px rgba(123, 44, 191, 0.3);
            transition: 0.2s;
        }

        button:hover {
            background: #9d4edd;
            transform: scale(1.05);
        }

        /* Flip animations */
        .book.open .cover {
            transform: rotateY(-180deg);
        }

        .book.page1-open .page-1 {
            transform: rotateY(0deg);
        }

        .book.page2-open .page-1 {
            transform: rotateY(-180deg);
        }
        .book.page2-open .page-2 {
            transform: rotateY(0deg);
        }

        .book.page3-open .page-2 {
            transform: rotateY(-180deg);
        }
        .book.page3-open .page-3 {
            transform: rotateY(0deg);
        }

        /* Typing cursor */
        .cursor {
            display: inline-block;
            width: 3px;
            height: 1.2em;
            background: #6a0572;
            margin-left: 2px;
            animation: blink 0.7s infinite;
            vertical-align: text-bottom;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="book" id="birthdayBook">
        <!-- Cover Page -->
        <div class="page cover" id="cover">
            <div class="cover-text">👉 Click to Open</div>
            <div class="cake-container">
                <div class="cake-bg">
                    <div class="cake">
                        <div class="layer layer-bottom"></div>
                        <div class="layer layer-middle"></div>
                        <div class="layer layer-top"></div>
                        <div class="icing"></div>
                        <div class="candle"><div class="flame"></div></div>
                    </div>
                </div>
                <div class="gift-text">
                    This is my gift for you<br>
                    From Rex Denoyo
                </div>
            </div>
        </div>

        <!-- Page 1 -->
        <div class="page page-1" id="page1">
            <div class="text-area">
                <div class="page-title" id="title1"></div>
                <div class="page-content" id="content1"></div>
                <div class="btn-group">
                    <button id="btnNext1">Next ➡️</button>
                </div>
            </div>
        </div>

        <!-- Page 2 -->
        <div class="page page-2" id="page2">
            <div class="text-area">
                <div class="page-title" id="title2"></div>
                <div class="page-content" id="content2"></div>
                <div class="btn-group">
                    <button id="btnPrev1">⬅️ Back</button>
                    <button id="btnNext2">Next ➡️</button>
                </div>
            </div>
        </div>

        <!-- Page 3 -->
        <div class="page page-3" id="page3">
            <div class="text-area">
                <div class="page-title" id="title3"></div>
                <div class="page-content" id="content3"></div>
                <div class="btn-group">
                    <button id="btnPrev2">⬅️ Back</button>
                    <button id="btnClose">Close 📕</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const book = document.getElementById('birthdayBook');
        let animationDone = false;

        // Typing animation function
        function typeWriter(element, text, speed = 60, callback) {
            let i = 0;
            element.innerHTML = '<span class="cursor"></span>';
            const cursor = element.querySelector('.cursor');
            function write() {
                if (i < text.length) {
                    cursor.before(text.charAt(i));
                    i++;
                    setTimeout(write, speed);
                } else {
                    cursor.remove();
                    if (callback) callback();
                }
            }
            write();
        }

        // Open book
        document.getElementById('cover').addEventListener('click', () => {
            book.classList.add('open', 'page1-open');
            if (!animationDone) {
                animationDone = true;
                setTimeout(() => {
                    typeWriter(document.getElementById('title1'), "Happy Birthday!", 70, () => {
                        typeWriter(document.getElementById('content1'), "Wish you good health always, pre!\nSana all good ang takbo ng buhay mo.\nAll your efforts will pay off soon, just keep going.\nEnjoy every moment, deserve mo lahat ng magagandang bagay!", 45);
                    });
                }, 1000);
            }
        });

        // Go to Page 2
        document.getElementById('btnNext1').addEventListener('click', () => {
            book.classList.remove('page1-open');
            book.classList.add('page2-open');
            setTimeout(() => {
                typeWriter(document.getElementById('title2'), "My Wishes 🙏", 70, () => {
                    typeWriter(document.getElementById('content2'), "May God give you more blessings and success.\nSana matupad lahat ng mga dreams and goals mo.\nStay humble and happy, whatever happens.\nMarami pang celebrations ang darating sa'yo!", 45);
                });
            }, 1000);
        });

        // Go back to Page 1
        document.getElementById('btnPrev1').addEventListener('click', () => {
            book.classList.remove('page2-open');
            book.classList.add('page1-open');
        });

        // Go to Page 3
        document.getElementById('btnNext2').addEventListener('click', () => {
            book.classList.remove('page2-open');
            book.classList.add('page3-open');
            setTimeout(() => {
                typeWriter(document.getElementById('title3'), "For You 🎁", 70, () => {
                    typeWriter(document.getElementById('content3'), "Thank you for being a true friend.\nSana maging masaya ka sa araw na ito.\nSimple lang ito pero galing sa puso ko.\nHave a blast and enjoy your special day, pre!", 45);
                });
            }, 1000);
        });

        // Go back to Page 2
        document.getElementById('btnPrev2').addEventListener('click', () => {
            book.classList.remove('page3-open');
            book.classList.add('page2-open');
        });

        // Close book
        document.getElementById('btnClose').addEventListener('click', () => {
            book.classList.remove('open', 'page1-open', 'page2-open', 'page3-open');
            setTimeout(() => {
                document.getElementById('title1').innerHTML = "";
                document.getElementById('content1').innerHTML = "";
                document.getElementById('title2').innerHTML = "";
                document.getElementById('content2').innerHTML = "";
                document.getElementById('title3').innerHTML = "";
                document.getElementById('content3').innerHTML = "";
                animationDone = false;
            }, 1000);
        });
    </script>
</body>
    </html>
